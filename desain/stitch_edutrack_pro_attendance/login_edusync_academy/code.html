<!DOCTYPE html>

                        "secondary": "#5d5f5f",
                        "primary-container": "#1a73e8",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .geometric-bg {
            background-color: #f8f9fa;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23e8eaed' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .login-card {
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.05);
            border: 1px solid #E8EAED;
        }
        .input-focus:focus-within {
            border-color: #1A73E8;
            border-width: 2px;
        }
    </style>
</head>
<body class="bg-background font-body-md text-on-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop geometric-bg">
<!-- Login Container -->
<main class="w-full max-w-md">
<div class="login-card bg-surface-container-lowest rounded-xl p-8 md:p-10 flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-8 text-center">
<img alt="EduSync Academy Logo" class="w-24 h-24 mb-4 object-contain mx-auto" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDef2YwIvaKNxGqiZt4oo6w4PN2PsTzcifQp4WYeozvLG-rNOlVG8m3PXama0xdq2RtCahIIUED6OPOkqG9G00kuKr6fwzY6BKHXea4UtNIc6PQISYlBmLAFdJgDSyiZDOb3wDaIW5kK58ypDkIwQQlwK2444UDyt2xOS3drQU-c56NTxNB1YJADH-xrqkUfR5iVLjPZD3zQiTyasMpgFHiHWePbNskYcJ_o5xCNiBCbuyiQRa9nZbqbwkO1n6Vh3xk33XQGC1GCOA"/>
<h1 class="text-headline-md font-headline-md text-primary">EduSync Academy</h1>
<p class="text-body-sm text-on-surface-variant mt-2">Institutional Efficiency Redefined</p>
</div>
<!-- Role Selection Toggle -->
<div class="w-full mb-8 p-1 bg-surface-container-low rounded-lg flex relative" id="role-toggle-container">
<div class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-surface-container-lowest rounded-md shadow-sm transition-all duration-300 ease-in-out" id="role-indicator"></div>
<button class="relative z-10 flex-1 py-2 text-label-md font-label-md text-primary text-center transition-colors" id="btn-teacher" onclick="switchRole('teacher')" type="button">
                    Login as Teacher
                </button>
<button class="relative z-10 flex-1 py-2 text-label-md font-label-md text-on-surface-variant text-center transition-colors" id="btn-admin" onclick="switchRole('admin')" type="button">
                    Login as Administrator
                </button>
</div>
<!-- Login Form -->
<form action="#" class="w-full space-y-6" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-label-md font-label-md text-on-surface-variant block" for="email">Email Address</label>
<div class="relative flex items-center bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 input-focus transition-all group">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary mr-3">mail</span>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-body-md text-on-surface placeholder:text-outline-variant" id="email" name="email" placeholder="admin@edusync.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="text-label-md font-label-md text-on-surface-variant block" for="password">Password</label>
<div class="relative flex items-center bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 input-focus transition-all group">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary mr-3">lock</span>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-body-md text-on-surface placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-body-lg">visibility</span>
</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
<span class="text-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember Me</span>
</label>
<a class="text-body-sm font-label-md text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary-container hover:bg-primary text-on-primary-container font-headline-md py-4 rounded-lg transition-all active:scale-[0.98] shadow-sm" type="submit">
                    Sign In
                </button>
</form>
<!-- Footer Info -->
<div class="mt-8 pt-6 border-t border-surface-variant w-full text-center">
<p class="text-body-sm text-on-surface-variant">
                    Having trouble logging in? <br/>
<a class="text-primary font-label-md hover:underline" href="#">Contact System Support</a>
</p>
</div>
</div>
<!-- External Links -->
<div class="mt-6 flex justify-center space-x-6 text-body-sm text-outline">
<a class="hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<span>•</span>
<a class="hover:text-on-surface transition-colors" href="#">Terms of Service</a>
</div>
</main>
<script>
        function switchRole(role) {
            const indicator = document.getElementById('role-indicator');
            const teacherBtn = document.getElementById('btn-teacher');
            const adminBtn = document.getElementById('btn-admin');
            const emailInput = document.getElementById('email');

            if (role === 'teacher') {
                indicator.style.transform = 'translateX(0)';
                teacherBtn.classList.add('text-primary');
                teacherBtn.classList.remove('text-on-surface-variant');
                adminBtn.classList.add('text-on-surface-variant');
                adminBtn.classList.remove('text-primary');
                emailInput.placeholder = 'teacher@edusync.com';
            } else {
                indicator.style.transform = 'translateX(calc(100% + 8px))';
                adminBtn.classList.add('text-primary');
                adminBtn.classList.remove('text-on-surface-variant');
                teacherBtn.classList.add('text-on-surface-variant');
                teacherBtn.classList.remove('text-primary');
                emailInput.placeholder = 'admin@edusync.com';
            }
        }
    </script>
</body></html>
